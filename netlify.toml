[build]
  command = "npm install"
  publish = "."
  edge_functions = "netlify/edge-functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ✅ Bezpieczne nagłówki HTTP — nie ingerują w działanie aplikacji
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ✅ Dodatkowy pas bezpieczeństwa — pliki które nie powinny być dostępne publicznie
[[redirects]]
  from = "/.env*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/404"
  status = 404
  force = true
